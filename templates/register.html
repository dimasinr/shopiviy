{% extends 'base.html' %}

{% block content %}
<div class="max-w-md mx-auto my-10 bg-white p-8 rounded-3xl shadow-[0_4px_20px_-5px_rgba(0,0,0,0.05)] border border-gray-100 relative overflow-hidden">
    <div class="relative z-10">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-extrabold text-gray-800 mb-2">Daftar Akun</h1>
            <p class="text-gray-500 text-sm">Bergabung dengan Shopiviy hari ini</p>
        </div>

        {% if messages %}
            {% for message in messages %}
            <div class="bg-red-50 text-red-600 p-3 rounded-xl mb-4 text-sm font-medium">
                {{ message }}
            </div>
            {% endfor %}
        {% endif %}

        <form method="POST" action="{% url 'register' %}" class="space-y-4">
            {% csrf_token %}
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">Username</label>
                <input type="text" name="username" required class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-2 focus:outline-none focus:ring-2 focus:ring-primary focus:bg-white" placeholder="Username">
            </div>
            
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">Email</label>
                <input type="email" name="email" required class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-2 focus:outline-none focus:ring-2 focus:ring-primary focus:bg-white" placeholder="Email Anda">
            </div>

            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">Password</label>
                <input type="password" name="password" required class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-2 focus:outline-none focus:ring-2 focus:ring-primary focus:bg-white" placeholder="Password Kuat">
            </div>



            <button type="submit" class="w-full btn-primary py-3 rounded-xl font-bold text-lg shadow-lg shadow-orange-500/30 mt-6 active:scale-95 transition-transform">
                Daftar
            </button>
        </form>

        <div class="mt-8 text-center text-sm text-gray-500">
            Sudah punya akun? <a href="{% url 'login' %}" class="font-bold text-primary hover:text-secondary transition">Masuk di sini</a>
        </div>
    </div>
</div>
{% endblock %}
