{% extends 'base.html' %}

{% block content %}
<div class="max-w-md mx-auto my-10 bg-white p-8 rounded-3xl shadow-[0_4px_20px_-5px_rgba(0,0,0,0.05)] border border-gray-100 relative overflow-hidden">
    <!-- Decor element -->
    <div class="absolute -top-10 -right-10 w-32 h-32 bg-primary/20 rounded-full blur-2xl"></div>
    <div class="absolute -bottom-10 -left-10 w-32 h-32 bg-secondary/20 rounded-full blur-2xl"></div>
    
    <div class="relative z-10">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-extrabold text-gray-800 mb-2">Selamat Datang!</h1>
            <p class="text-gray-500 text-sm">Masuk untuk mulai berbelanja di Shopivywear</p>
        </div>

        {% if messages %}
            {% for message in messages %}
            <div class="bg-red-50 text-red-600 p-3 rounded-xl mb-4 text-sm font-medium">
                {{ message }}
            </div>
            {% endfor %}
        {% endif %}

        <form method="POST" action="{% url 'login' %}" class="space-y-5">
            {% csrf_token %}
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-2">Username</label>
                <div class="relative">
                    <input type="text" name="username" required class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 pl-10 focus:outline-none focus:ring-2 focus:ring-primary focus:bg-white transition" placeholder="Masukkan username">
                    <i class="fas fa-user absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                </div>
            </div>
            
            <div>
                <div class="flex justify-between items-center mb-2">
                    <label class="block text-sm font-bold text-gray-700">Password</label>
                    <a href="#" class="text-xs font-bold text-primary hover:text-secondary">Lupa Password?</a>
                </div>
                <div class="relative" x-data="{ show: false }">
                    <input :type="show ? 'text' : 'password'" name="password" required class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 pl-10 focus:outline-none focus:ring-2 focus:ring-primary focus:bg-white transition" placeholder="Masukkan password">
                    <i class="fas fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                    <button type="button" @click="show = !show" class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 focus:outline-none">
                        <i class="fas" :class="show ? 'fa-eye-slash' : 'fa-eye'"></i>
                    </button>
                </div>
            </div>

            <button type="submit" class="w-full btn-primary py-3 rounded-xl font-bold text-lg shadow-lg shadow-orange-500/30 mt-4 active:scale-95 transition-transform">
                Masuk
            </button>
        </form>

        <div class="mt-8 text-center text-sm text-gray-500">
            Belum punya akun? <a href="{% url 'register' %}" class="font-bold text-primary hover:text-secondary transition">Daftar Sekarang</a>
        </div>
    </div>
</div>
{% endblock %}
